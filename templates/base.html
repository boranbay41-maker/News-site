{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NewsTalk - Свежие новости{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <i class="fas fa-newspaper"></i>
                <span>NewsTalk</span>
            </div>
            <div class="nav-search">
                <input type="text" placeholder="Поиск новостей...">
                <button><i class="fas fa-search"></i></button>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link active"><i class="fas fa-home"></i> Главная</a></li>
                <li><a href="#" class="nav-link"><i class="fas fa-globe"></i> Мир</a></li>
                <li><a href="#" class="nav-link"><i class="fas fa-flag"></i> Узбекистан</a></li>
                <li><a href="#" class="nav-link"><i class="fas fa-chart-line"></i> Экономика</a></li>
                <li><a href="#" class="nav-link"><i class="fas fa-microchip"></i> Технологии</a></li>
            </ul>
        </div>
    </nav>

    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}

    <a href="/newstalk-secret-panel/" style="color:#f8f8f8; font-size:6px;">·</a>

</body>
</html>
